name: 🚀 Deploy Academia_Effi

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest

    env:
      SSH_USER: deploy
      SSH_HOST: 167.71.181.107
      SSH_PORT: 22
      APP_PATH: /var/www/Academia_Effi

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔐 Setup SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p $SSH_PORT $SSH_HOST >> ~/.ssh/known_hosts

      - name: 🚀 Deploy via SSH
        run: |
          ssh -p $SSH_PORT -o StrictHostKeyChecking=yes $SSH_USER@$SSH_HOST << EOF
            set -e
      
            echo "📂 Entrando al proyecto"
            cd "$APP_PATH"
      
            echo "📍Ruta actual: $(pwd)"
            ls -la
      
            echo "📥 Actualizando código"
            git fetch --all
            git reset --hard origin/main
      
            echo "📦 Instalando dependencias PHP"
            composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader
      
            echo "🧹 Limpiando cachés"
            php artisan optimize:clear || true
            php artisan optimize || true
      
            echo "🗄️ Ejecutando migraciones"
            php artisan migrate --force
      
            echo "🎨 Construyendo assets (Vite)"
            command -v npm >/dev/null 2>&1 || export PATH="$PATH:/usr/bin:/usr/local/bin"
            if [ -f package-lock.json ]; then
              npm ci
            else
              npm install
            fi
            npm run build
      
            echo "🔒 Ajustando permisos"
            chmod -R 775 storage bootstrap/cache || true
      
            echo "✅ Deploy completado"
          EOF
